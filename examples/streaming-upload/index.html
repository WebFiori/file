<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Upload</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { margin-bottom: 20px; font-size: 1.4em; }
        .drop-zone {
            border: 2px dashed #ccc; border-radius: 8px; padding: 40px;
            text-align: center; margin-bottom: 20px; cursor: pointer;
            transition: border-color 0.2s;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: #4a90d9; }
        input[type="file"] { display: none; }
        .status { padding: 12px; border-radius: 4px; font-size: 0.9em; display: none; }
        .status.success { display: block; background: #dff0d8; color: #3c763d; }
        .status.error { display: block; background: #f2dede; color: #a94442; }
        .spinner { display: none; text-align: center; margin-bottom: 20px; color: #666; }
    </style>
</head>
<body>
    <h1>Streaming Upload (One-Shot)</h1>

    <div class="drop-zone" id="dropZone">
        <p>Drop a file here or click to select</p>
        <p style="font-size: 0.85em; color: #999; margin-top: 8px;">File is streamed in a single request</p>
        <input type="file" id="fileInput">
    </div>

    <div class="spinner" id="spinner">Uploading...</div>
    <div class="status" id="status"></div>

    <script>
    const SERVER_URL = '/server.php';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) upload(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) upload(fileInput.files[0]);
    });

    async function upload(file) {
        document.getElementById('spinner').style.display = 'block';
        document.getElementById('status').className = 'status';

        try {
            const response = await fetch(SERVER_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/octet-stream',
                    'X-Filename': file.name
                },
                body: file
            });

            const result = await response.json();

            if (!response.ok) throw new Error(result.error || 'Upload failed');

            showStatus('success',
                `<strong>Upload complete:</strong> ${result.filename}<br>` +
                `Size: ${formatSize(result.size)}<br>` +
                `SHA-256: <code>${result.sha256}</code>`
            );
        } catch (err) {
            showStatus('error', `Upload failed: ${err.message}`);
        } finally {
            document.getElementById('spinner').style.display = 'none';
        }
    }

    function showStatus(type, msg) {
        const el = document.getElementById('status');
        el.className = 'status ' + type;
        el.innerHTML = msg;
    }

    function formatSize(bytes) {
        if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(2) + ' GB';
        if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
        if (bytes >= 1024) return (bytes / 1024).toFixed(0) + ' KB';
        return bytes + ' B';
    }
    </script>
</body>
</html>
